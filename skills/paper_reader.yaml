# PaperReader Skill Configuration
# Place this file in: ~/.claude/skills/paper_reader.yaml

name: paper_reader
description: Process academic papers and generate AI-powered presentations
version: 1.0.0
author: PaperReader Team

# Skill metadata
tags:
  - academic
  - paper
  - presentation
  - pdf
  - ai

# Commands definition
commands:
  # Main command: process single paper
  paper:
    description: |
      Process a PDF paper and generate presentation slides.
      Uses AI to analyze the paper and create structured slides.

    syntax: /paper [filename] [--format=html|pdf|md] [--verbose] [--no-cache]

    parameters:
      filename:
        type: string
        optional: true
        description: PDF filename or path. If omitted, processes the latest PDF in papers/

      format:
        type: choice
        options: [html, pdf, md, markdown]
        default: html
        description: Output format

      verbose:
        type: flag
        description: Show detailed progress and statistics

      no-cache:
        type: flag
        description: Force re-analysis (ignore cache)

    examples:
      - command: /paper
        description: Process latest PDF to HTML presentation

      - command: /paper attention.pdf
        description: Process specific paper

      - command: /paper --pdf
        description: Generate PDF output

      - command: /paper transformer.pdf --verbose
        description: Process with detailed output

      - command: /paper paper.pdf -f md
        description: Generate Markdown only

  # Batch command: process all papers
  papers:
    description: Process all PDF papers in the papers/ directory

    syntax: /papers [--format=html|pdf|md]

    parameters:
      format:
        type: choice
        options: [html, pdf, md, markdown]
        default: html

    examples:
      - command: /papers
        description: Process all papers to HTML

      - command: /papers --pdf
        description: Generate PDF presentations for all papers

  # Quick commands
  ppt:
    description: Quick command to generate HTML presentation (alias for /paper --format=html)

    syntax: /ppt [filename]

    examples:
      - command: /ppt
        description: Generate presentation from latest PDF

      - command: /ppt attention.pdf
        description: Generate from specific file

  md:
    description: Quick command to generate Markdown only (alias for /paper --format=md)

    syntax: /md [filename]

    examples:
      - command: /md
        description: Generate Markdown from latest PDF

      - command: /md transformer.pdf
        description: Generate from specific file

  # Stats command
  papers-stats:
    description: Show cache statistics and processing history

    syntax: /papers-stats

# Handler configuration
handler:
  type: python
  module: skills.paper_reader
  function: handle_paper_command
  project_root: auto  # Auto-detect from skill location

# Integration features
integrations:
  # Auto-complete for PDF files
  auto_complete:
    triggers:
      - pattern: "/paper"
        complete_files: "*.pdf"
        search_paths:
          - papers/
          - ./

      - pattern: "/ppt"
        complete_files: "*.pdf"
        search_paths:
          - papers/

      - pattern: "/md"
        complete_files: "*.pdf"
        search_paths:
          - papers/

  # File watcher for new papers
  file_watcher:
    enabled: true
    path: papers/
    events:
      - new_file
    action:
      type: suggest
      message: |
        📄 New paper detected: {filename}

        Would you like me to process it?
        - `/paper {filename}` - Generate presentation
        - `/md {filename}` - Generate Markdown only

# User preferences (can be customized)
preferences:
  # Default output format
  default_format: html

  # Auto-open generated files
  auto_open_result: true

  # Show cost estimate before processing
  show_cost_warning: true
  cost_warning_threshold: 0.10  # Warn if cost > $0.10

  # Cache settings
  cache_enabled: true
  cache_ttl_days: 7

  # Display settings
  show_progress: true
  show_statistics: true

  # Output settings
  output_directory: output/
  preserve_filenames: true

# Help and documentation
help:
  overview: |
    PaperReader uses AI to automatically analyze academic papers and generate
    professional presentation slides. It extracts key information including
    problems, methods, results, and critical analysis.

  getting_started: |
    1. Place your PDF paper in the papers/ directory
    2. Run: /paper
    3. Find your presentation in output/slides/

  tips:
    - Use `/paper` without arguments to process the most recent PDF
    - Use `--verbose` to see detailed progress and cost information
    - Markdown format is fastest and allows manual editing
    - Cached papers are reprocessed instantly at no cost
    - Generated slides include 15-20 slides with pros/cons analysis

  troubleshooting:
    - "Error: PDF not found": Make sure the PDF is in the papers/ directory
    - "Error: API key not found": Set ANTHROPIC_API_KEY in .env file
    - "Processing failed": Try with --verbose flag to see details
    - "Marp CLI not found": Install with `npm install -g @marp-team/marp-cli`

# Keyboard shortcuts (optional)
shortcuts:
  "Ctrl+Shift+P": "/paper"  # Quick process
  "Ctrl+Shift+M": "/md"     # Quick Markdown

# Context menu additions
context_menu:
  - trigger: "right-click on .pdf file"
    items:
      - label: "Generate presentation"
        command: "/paper {filename} --format=html"
      - label: "Generate Markdown"
        command: "/md {filename}"
      - label: "Process with options..."
        command: "/paper {filename}"
        submenu: true
